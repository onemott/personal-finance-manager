<!DOCTYPE html>
<html>
<head>
    <title>紧急JavaScript修复测试</title>
</head>
<body>
    <h1>JavaScript功能测试</h1>
    <button onclick="testFunction()">测试按钮</button>
    <div id="result"></div>
    
    <script>
    function testFunction() {
        document.getElementById('result').innerHTML = 'JavaScript正常工作！';
        
        // 测试数据管理函数
        if (typeof showDataManagement === 'function') {
            document.getElementById('result').innerHTML += '<br>showDataManagement函数存在';
        } else {
            document.getElementById('result').innerHTML += '<br>❌ showDataManagement函数不存在';
        }
        
        // 测试模态框元素
        const modal = document.getElementById('dataManagementModal');
        if (modal) {
            document.getElementById('result').innerHTML += '<br>dataManagementModal元素存在';
        } else {
            document.getElementById('result').innerHTML += '<br>❌ dataManagementModal元素不存在';
        }
    }
    
    // 创建临时的showDataManagement函数
    function showDataManagement() {
        alert('数据管理功能已修复！');
    }
    </script>
</body>
</html>
